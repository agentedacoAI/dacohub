server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /chatwoot/ {
        proxy_pass https://chat.agentedaco.com.br/;
        proxy_set_header Host chat.agentedaco.com.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header X-Frame-Options;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/' 'href="/chatwoot/';
        sub_filter 'src="/' 'src="/chatwoot/';
        sub_filter 'action="/' 'action="/chatwoot/';
    }

    location /vite/ {
        proxy_pass https://chat.agentedaco.com.br/vite/;
        proxy_set_header Host chat.agentedaco.com.br;
        proxy_hide_header X-Frame-Options;
    }

    location /assets/ {
        proxy_pass https://chat.agentedaco.com.br/assets/;
        proxy_set_header Host chat.agentedaco.com.br;
        proxy_hide_header X-Frame-Options;
    }

    location /packs/ {
        proxy_pass https://chat.agentedaco.com.br/packs/;
        proxy_set_header Host chat.agentedaco.com.br;
        proxy_hide_header X-Frame-Options;
    }

    location /auth/ {
        proxy_pass https://chat.agentedaco.com.br/auth/;
        proxy_set_header Host chat.agentedaco.com.br;
        proxy_hide_header X-Frame-Options;
    }

    location /api/ {
        proxy_pass https://chat.agentedaco.com.br/api/;
        proxy_set_header Host chat.agentedaco.com.br;
        proxy_hide_header X-Frame-Options;
    }

    location /cable {
        proxy_pass https://chat.agentedaco.com.br/cable;
        proxy_set_header Host chat.agentedaco.com.br;
        proxy_hide_header X-Frame-Options;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /brand-assets/ {
        proxy_pass https://chat.agentedaco.com.br/brand-assets/;
        proxy_set_header Host chat.agentedaco.com.br;
    }

    location ~* ^/(favicon|manifest|apple-touch) {
        proxy_pass https://chat.agentedaco.com.br;
        proxy_set_header Host chat.agentedaco.com.br;
    }
}
